name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (Nest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-nest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend-nest/package-lock.json
      # ВРЕМЕННО: если вариант B — снять конфликт пиров
      - run: npm ci --legacy-peer-deps
      # если сделали вариант A — используйте просто:
      # - run: npm ci
      - run: npm run build
      - run: npm test --if-present
      - name: Upload backend build
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend-nest/dist

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test --if-present
      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
